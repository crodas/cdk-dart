name: Publish Dart Bindings

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.16.0)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-native:
    name: "Build ${{ matrix.target }}"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            artifact: libcdk_ffi_dart.so
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            artifact: libcdk_ffi_dart.so

          # macOS
          - target: aarch64-apple-darwin
            runner: macos-14
            artifact: libcdk_ffi_dart.dylib

          # Windows
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: cdk_ffi_dart.dll

          # Android
          - target: aarch64-linux-android
            runner: ubuntu-22.04
            artifact: libcdk_ffi_dart.so
          - target: armv7-linux-androideabi
            runner: ubuntu-22.04
            artifact: libcdk_ffi_dart.so
          - target: x86_64-linux-android
            runner: ubuntu-22.04
            artifact: libcdk_ffi_dart.so

          # iOS
          - target: aarch64-apple-ios
            runner: macos-14
            artifact: libcdk_ffi_dart.a

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Android)
        if: contains(matrix.target, 'android')
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: "!contains(matrix.target, 'android')"
        working-directory: rust
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross / Android)
        if: contains(matrix.target, 'android')
        working-directory: rust
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "rust/target/${{ matrix.target }}/release/${{ matrix.artifact }}" \
             "dist/${{ matrix.target }}-${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: dist/

  generate-bindings:
    name: "Generate Dart bindings"
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build cdylib
        working-directory: rust
        run: cargo build --release

      - name: Generate Dart sources
        working-directory: rust
        run: |
          mkdir -p ../lib/src/generated
          cargo run --release --bin uniffi-bindgen -- \
            target/release/libcdk_ffi_dart.so \
            --out-dir ../lib/src/generated

      - name: Upload generated sources
        uses: actions/upload-artifact@v4
        with:
          name: generated-dart
          path: lib/src/generated/

  release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    needs: [build-native, generate-bindings]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: native-*
          merge-multiple: true

      - name: Download generated Dart sources
        uses: actions/download-artifact@v4
        with:
          name: generated-dart
          path: ./generated-dart

      - name: Package release
        run: |
          mkdir -p release/native

          # Move all native libs into release/native/
          mv artifacts/* release/native/

          # Copy generated Dart sources
          mkdir -p release/lib/src/generated
          cp -r generated-dart/* release/lib/src/generated/

          # Create checksums
          cd release/native
          sha256sum * > SHA256SUMS
          cd ../..

          # Create tarball of all native libs
          tar -czf release/native-libs.tar.gz -C release/native .

      - name: Determine tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          # Create release if it doesn't exist
          gh release create "$TAG" \
            --title "Release $TAG" \
            --generate-notes \
            2>/dev/null || true

          # Upload native libraries individually
          for f in release/native/*; do
            gh release upload "$TAG" "$f" --clobber
          done

          # Upload the combined tarball
          gh release upload "$TAG" release/native-libs.tar.gz --clobber
