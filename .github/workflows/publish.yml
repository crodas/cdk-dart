name: Publish Dart Bindings

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.16.0)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-native:
    name: "Build ${{ matrix.target }}"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            artifact: libcdk_ffi_dart.so
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            artifact: libcdk_ffi_dart.so

          # macOS
          - target: aarch64-apple-darwin
            runner: macos-14
            artifact: libcdk_ffi_dart.dylib

          # Windows
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: cdk_ffi_dart.dll

          # Android
          - target: aarch64-linux-android
            runner: ubuntu-22.04
            artifact: libcdk_ffi_dart.so
          - target: armv7-linux-androideabi
            runner: ubuntu-22.04
            artifact: libcdk_ffi_dart.so
          - target: x86_64-linux-android
            runner: ubuntu-22.04
            artifact: libcdk_ffi_dart.so

          # iOS
          - target: aarch64-apple-ios
            runner: macos-14
            artifact: libcdk_ffi_dart.a

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Android)
        if: contains(matrix.target, 'android')
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: "!contains(matrix.target, 'android')"
        working-directory: rust
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross / Android)
        if: contains(matrix.target, 'android')
        working-directory: rust
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "rust/target/${{ matrix.target }}/release/${{ matrix.artifact }}" \
             "dist/${{ matrix.target }}-${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: dist/

  generate-bindings:
    name: "Generate Dart bindings"
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build cdylib
        working-directory: rust
        run: cargo build --release

      - name: Generate Dart sources
        working-directory: rust
        run: |
          mkdir -p ../lib/src/generated
          cargo run --release --bin uniffi-bindgen -- \
            target/release/libcdk_ffi_dart.so \
            --out-dir ../lib/src/generated

      - name: Upload generated sources
        uses: actions/upload-artifact@v4
        with:
          name: generated-dart
          path: lib/src/generated/

  release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    needs: [build-native, generate-bindings]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: native-*
          merge-multiple: true

      - name: Download generated Dart sources
        uses: actions/download-artifact@v4
        with:
          name: generated-dart
          path: ./generated-dart

      - name: Package per-platform zips
        run: |
          mkdir -p release

          # For each native artifact, create a zip bundling the native lib + generated dart
          for f in artifacts/*; do
            filename=$(basename "$f")
            # filename is like: aarch64-apple-darwin-libcdk_ffi_dart.dylib
            # Strip known artifact names to extract the target triple
            for suffix in libcdk_ffi_dart.so libcdk_ffi_dart.dylib libcdk_ffi_dart.a cdk_ffi_dart.dll; do
              if [[ "$filename" == *"-${suffix}" ]]; then
                target="${filename%-${suffix}}"
                native_file="${suffix}"
                break
              fi
            done

            # Create platform directory
            pkg_dir="pkg-${target}"
            mkdir -p "${pkg_dir}/lib/src/generated"

            # Copy native library (original name without target prefix)
            cp "$f" "${pkg_dir}/${native_file}"

            # Copy generated Dart sources
            cp -r generated-dart/* "${pkg_dir}/lib/src/generated/"

            # Create zip
            (cd "${pkg_dir}" && zip -r "../release/cdk-dart-${target}.zip" .)
            rm -rf "${pkg_dir}"
          done

          # Create checksums for all zips
          cd release
          sha256sum *.zip > SHA256SUMS

      - name: Determine tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          # Create release if it doesn't exist
          gh release create "$TAG" \
            --title "Release $TAG" \
            --generate-notes \
            2>/dev/null || true

          # Upload per-platform zips and checksums
          for f in release/*.zip release/SHA256SUMS; do
            gh release upload "$TAG" "$f" --clobber
          done
